name: Release APK

on:
  push:
    branches: [master, phone, tablet]
    paths:
      - 'app/build.gradle'
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_USER: stlxing1987
  REPO_NAME: dhmtv

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect platform from branch
        id: platform
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          case "$BRANCH" in
            master) PLATFORM=tv; UPDATE_FILE=docs/update-tv.json; TAG_SUFFIX=-tv; APK_NAME=app-tv.apk ;;
            phone)  PLATFORM=phone; UPDATE_FILE=docs/update-phone.json; TAG_SUFFIX=-phone; APK_NAME=app-phone.apk ;;
            tablet) PLATFORM=tablet; UPDATE_FILE=docs/update-tablet.json; TAG_SUFFIX=-tablet; APK_NAME=app-tablet.apk ;;
            *) echo "Unsupported branch: $BRANCH"; exit 1 ;;
          esac
          echo "platform=$PLATFORM" >> $GITHUB_OUTPUT
          echo "update_file=$UPDATE_FILE" >> $GITHUB_OUTPUT
          echo "tag_suffix=$TAG_SUFFIX" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION_CODE=$(grep -oP "versionCode \K\d+" app/build.gradle)
          VERSION_NAME=$(grep -oP "versionName '\K[^']+" app/build.gradle)
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}${{ steps.platform.outputs.tag_suffix }}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Build signed APK
        env:
          GRADLE_OPTS: -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000
        run: |
          chmod +x gradlew
          for attempt in 1 2 3 4 5; do
            echo "Build attempt ${attempt}/5"
            ./gradlew assembleDebug --no-daemon && exit 0
            echo "Build failed, wait 30s before retry..."
            sleep 30
          done
          exit 1

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.platform.outputs.apk_name }}"

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }} (${{ steps.platform.outputs.platform }})
          files: ${{ steps.platform.outputs.apk_name }}
          overwrite_files: true
          make_latest: true

      - name: Generate update json
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_CODE="${{ steps.version.outputs.code }}"
          VERSION_NAME="${{ steps.version.outputs.name }}"
          APK_NAME="${{ steps.platform.outputs.apk_name }}"
          UPDATE_FILE="${{ steps.platform.outputs.update_file }}"
          PLATFORM="${{ steps.platform.outputs.platform }}"
          APK_URL="https://gh-proxy.com/https://github.com/${{ env.GH_USER }}/${{ env.REPO_NAME }}/releases/download/${TAG}/${APK_NAME}"
          CHANGELOG=$(git log -1 --pretty=%B | head -c 500 | python3 -c "import json,sys; print(json.dumps(sys.stdin.read().strip()))")
          cat > "$UPDATE_FILE" << EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${APK_URL}",
            "forceUpdate": false,
            "changelog": ${CHANGELOG}
          }
          EOF

      - name: Commit update json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.platform.outputs.update_file }}"
          if git diff --staged --quiet; then
            echo "update json unchanged, skip commit"
          else
            git commit -m "chore: sync ${{ steps.platform.outputs.update_file }} for ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:${GITHUB_REF#refs/heads/}
          fi

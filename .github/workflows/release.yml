name: Release APK

on:
  push:
    branches: [master, main]
    paths:
      - 'app/build.gradle'
  workflow_dispatch:

permissions:
  contents: write

env:
  GH_USER: stlxing1987
  REPO_NAME: dhmtv

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION_CODE=$(grep -oP "versionCode \K\d+" app/build.gradle)
          VERSION_NAME=$(grep -oP "versionName '\K[^']+" app/build.gradle)
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/debug/app-debug.apk
          overwrite_files: true
          make_latest: true

      - name: Generate update.json
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION_CODE="${{ steps.version.outputs.code }}"
          VERSION_NAME="${{ steps.version.outputs.name }}"
          APK_URL="https://gh-proxy.com/https://github.com/${{ env.GH_USER }}/${{ env.REPO_NAME }}/releases/download/${TAG}/app-debug.apk"
          CHANGELOG=$(git log -1 --pretty=%B | head -c 500 | python3 -c "import json,sys; print(json.dumps(sys.stdin.read().strip()))")
          cat > docs/update.json << EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${APK_URL}",
            "forceUpdate": false,
            "changelog": ${CHANGELOG}
          }
          EOF

      - name: Commit update.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/update.json
          if git diff --staged --quiet; then
            echo "update.json unchanged, skip commit"
          else
            git commit -m "chore: sync update.json for ${{ steps.version.outputs.tag }} [skip ci]"
            git push origin HEAD:master
          fi
